<?xml version="1.0" encoding="UTF-8"?>
<svg width="2048" height="2048" viewBox="0 0 2048 2048" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Subtle gradients for depth and polish -->
    <linearGradient id="leftRing" x1="0.2" y1="0.1" x2="0.8" y2="0.9">
      <stop offset="0%" stop-color="#5CA09D"/>
      <stop offset="100%" stop-color="#3F8381"/>
    </linearGradient>
    <linearGradient id="rightRing" x1="0.2" y1="0.1" x2="0.8" y2="0.9">
      <stop offset="0%" stop-color="#8CC2B4"/>
      <stop offset="100%" stop-color="#6BAD9D"/>
    </linearGradient>

    <!-- Clip path for interlocking effect -->
    <clipPath id="lowerHalf">
      <rect x="0" y="1024" width="2048" height="1024"/>
    </clipPath>

    <!-- Subtle ambient shadow -->
    <filter id="softShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#3A7A78" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background — soft off-white rounded rect -->
  <rect width="2048" height="2048" rx="400" fill="#F8F9F9"/>

  <!-- Logo mark -->
  <g filter="url(#softShadow)">
    <!-- 1. Right ring — full, sits behind left ring by default -->
    <circle cx="1230" cy="1024" r="296" fill="none"
            stroke="url(#rightRing)" stroke-width="248"/>

    <!-- 2. Left ring — full, covers right ring at the top crossing -->
    <circle cx="818" cy="1024" r="296" fill="none"
            stroke="url(#leftRing)" stroke-width="248"/>

    <!-- 3. Right ring — bottom half only, brings right in front at the bottom crossing -->
    <g clip-path="url(#lowerHalf)">
      <circle cx="1230" cy="1024" r="296" fill="none"
              stroke="url(#rightRing)" stroke-width="248"/>
    </g>
  </g>
</svg>
